name: Daily Mastodon Post

on:
  # DISABLED 2026-07-01 — the xClues Mastodon account was suspended, so the
  # daily schedule is commented out (would fail every run). Re-enable the cron
  # below only if the account is reinstated.
  # schedule:
  #   # Runs at 13:30 UTC daily — 30 min offset from Bluesky so the two
  #   # don't compete for the same image-fetch + logs don't collide.
  #   - cron: "30 13 * * *"
  workflow_dispatch: # Manual trigger only while suspended

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Post today's puzzle to Mastodon
        env:
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: bun run scripts/post-daily-mastodon.ts
