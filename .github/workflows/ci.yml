name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run style:lint
      - run: bunx tsc --noEmit
      - run: bun run dup
      - run: bun run test
      # The Supabase client throws on the server when its public env vars are
      # absent (to surface broken deploys). Placeholders let the build compile —
      # build-time pages don't hit the DB; real values live in Vercel.
      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      - name: Bundle size budget
        run: bun run bundle:budget
      # Non-blocking for now: the dependency tree has transitive dev-tool
      # advisories (capacitor → xmldom/tar, vitest UI, Next bump). This step
      # surfaces them; patch the ones that matter manually (or enable GitHub
      # Dependabot alerts for notifications). Flip to blocking (remove
      # continue-on-error) and tighten the threshold once the tree is clean.
      - name: Dependency audit (report-only)
        run: bun run audit:ci
        continue-on-error: true

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required by gitleaks-action@v2 to scan pull requests.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  db-types-drift:
    # Fails if the committed Supabase types are out of sync with the live
    # schema. Skips automatically until SUPABASE_ACCESS_TOKEN is configured.
    runs-on: ubuntu-latest
    if: ${{ vars.SUPABASE_TYPES_CHECK == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Check generated DB types are up to date
        run: bun run db:types:check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
