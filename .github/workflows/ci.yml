name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run style:lint
      - run: bunx tsc --noEmit
      - run: bun run dup
      - run: bun run test
      - run: bun run build
      - name: Bundle size budget
        run: bun run bundle:budget

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required by gitleaks-action@v2 to scan pull requests.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  db-types-drift:
    # Fails if the committed Supabase types are out of sync with the live
    # schema. Skips automatically until SUPABASE_ACCESS_TOKEN is configured.
    runs-on: ubuntu-latest
    if: ${{ vars.SUPABASE_TYPES_CHECK == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Check generated DB types are up to date
        run: bun run db:types:check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
